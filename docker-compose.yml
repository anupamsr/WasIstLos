version: '3.8'

services:
  wasistlos-build:
    build:
      context: .
      dockerfile: Dockerfile
    image: wasistlos:latest
    container_name: wasistlos-build
    volumes:
      - ./build:/app/build
    command: ["/bin/bash", "-c", "echo 'Build completed. Binary at: /app/build/release/wasistlos'"]
